<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Search - VoltRide</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
    <script src="../jsFile/jsFunctions.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="page">
        <div class="text-center w-100 mb-20">
            <h1>Search by Price Range</h1>
            <p>Find electric bikes that fit your budget.</p>
        </div>
        <div class="form-container w-100 mb-20" style="max-width: 600px; margin: 0 auto;">
            <div class="flex-row w-100">
                <div style="flex: 1;">
                    <label for="min-price">Min Price ($)</label>
                    <input type="number" id="min-price" placeholder="e.g. 500">
                </div>
                <div style="flex: 1;">
                    <label for="max-price">Max Price ($)</label>
                    <input type="number" id="max-price" placeholder="e.g. 5000">
                </div>
            </div>
            <button class="w-100 mt-20 lg-button">Apply Filter</button>
        </div>
        
        <div class="card-container w-100">
            <div class="card">
                <img src="../sources/folding-bike.png" alt="Compact Fold">
                <h3>Compact Fold E1</h3>
                <p>$1,299.00</p>
                <button class="w-100">View Details</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="text-center w-100">
            <p>&copy; 2026 VoltRide Electric Bikes.</p>
        </div>
    </footer>
</body>
</html>
