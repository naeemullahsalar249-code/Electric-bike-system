<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltRider E-Bikes - Contact Us</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="page">
        <h1 class="text-center">Contact Us</h1>
        <p class="text-center mb-4">We'd love to hear from you. Send us a message!</p>
        
        <div class="form-container">
            <form action="#">
                <div>
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required placeholder="Jane Doe">
                </div>
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="jane@example.com">
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                <div class="mt-4">
                    <button type="submit" class="w-full">Send Message</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div>
                <h2>VoltRider E-Bikes</h2>
                <p>&copy; 2026 VoltRider E-Bikes.</p>
            </div>
        </div>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
