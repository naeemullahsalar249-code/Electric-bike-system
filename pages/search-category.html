<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Search - VoltRide</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
    <script src="../jsFile/jsFunctions.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="page">
        <div class="text-center w-100 mb-20">
            <h1>Search by Category</h1>
            <p>Find the perfect electric bike for your riding style.</p>
        </div>
        <div class="form-container w-100 mb-20" style="max-width: 600px; margin: 0 auto;">
            <div class="w-100">
                <select id="category-select" class="w-100" style="padding: 15px; font-size: 1.1rem;">
                    <option value="" disabled selected>Select a Category...</option>
                    <option value="mountain">Mountain E-Bikes</option>
                    <option value="city">City Commuters</option>
                    <option value="racing">Racing E-Bikes</option>
                    <option value="folding">Folding E-Bikes</option>
                </select>
                <button class="w-100 mt-20 lg-button">Search Bikes</button>
            </div>
        </div>
        
        <div class="card-container w-100">
            <div class="card">
                <img src="../sources/mountain-bike.png" alt="Mountain Pro">
                <h3>Mountain Pro X1</h3>
                <p>Category: Mountain</p>
                <p>$2,499.00</p>
                <button class="w-100">View Details</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="text-center w-100">
            <p>&copy; 2026 VoltRide Electric Bikes.</p>
        </div>
    </footer>
</body>
</html>
