<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltRider E-Bikes - Price Search</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="page">
        <h1 class="text-center">Shop by Price</h1>
        
        <div class="form-container" style="max-width: 600px; margin-bottom: 24px;">
            <h2 class="text-center">Select Your Budget</h2>
            <form action="products.html" style="display: flex; gap: 16px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label for="min-price">Min Price ($)</label>
                    <input type="number" id="min-price" value="500">
                </div>
                <div style="flex: 1;">
                    <label for="max-price">Max Price ($)</label>
                    <input type="number" id="max-price" value="5000">
                </div>
                <div>
                    <button type="submit" style="padding: 10px 24px;">Filter</button>
                </div>
            </form>
        </div>

        <section class="card-container">
            <div class="card">
                <img src="../sources/folding-bike-updated.webp" alt="E-Bike under 1000">
                <h3>Budget Commuter</h3>
                <p>Price: $899.00</p>
                <div class="flex-center mt-4">
                    <button class="sm-button">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="../sources/city-bike-real.jpg" alt="E-Bike under 2000">
                <h3>Metro Glide</h3>
                <p>Price: $1,299.00</p>
                <div class="flex-center mt-4">
                    <button class="sm-button">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="../sources/racing-bike-real.webp" alt="E-Bike over 2000">
                <h3>Aero Speedster</h3>
                <p>Price: $2,499.00</p>
                <div class="flex-center mt-4">
                    <button class="sm-button">Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div>
                <h2>VoltRider E-Bikes</h2>
                <p>&copy; 2026 VoltRider E-Bikes.</p>
            </div>
        </div>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
