<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltRider E-Bikes - Shopping Cart</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="page">
        <h1 class="text-center">Your Shopping Cart</h1>
        
        <section class="w-full" style="max-width: 1000px;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="min-width: 80px; max-width: 120px;">Image</th>
                            <th style="min-width: 200px; max-width: 300px;">Product Name</th>
                            <th style="min-width: 80px; max-width: 120px;">Quantity</th>
                            <th style="min-width: 100px; max-width: 150px;">Price</th>
                            <th style="min-width: 100px; max-width: 150px;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><img src="../sources/mountain-bike-real.webp" alt="Peak Explorer" style="width: 80px; border-radius: var(--radius-sm);"></td>
                            <td>Peak Explorer Mountain E-Bike</td>
                            <td>
                                <input type="number" value="1" min="1" style="width: 60px;">
                            </td>
                            <td>$1,899.00</td>
                            <td style="font-weight: bold;">$1,899.00</td>
                        </tr>
                        <tr>
                            <td><img src="../sources/city-bike-real.jpg" alt="Metro Glide" style="width: 80px; border-radius: var(--radius-sm);"></td>
                            <td>Metro Glide City E-Bike</td>
                            <td>
                                <input type="number" value="2" min="1" style="width: 60px;">
                            </td>
                            <td>$1,299.00</td>
                            <td style="font-weight: bold;">$2,598.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card" style="margin-top: 24px; margin-left: auto; width: 350px;">
                <h2>Order Summary</h2>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>Subtotal</span>
                    <span>$4,497.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>Shipping</span>
                    <span>$50.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-weight: bold; font-size: 1.2rem; border-top: 1px solid var(--border-muted-color); padding-top: 8px;">
                    <span>Total</span>
                    <span>$4,547.00</span>
                </div>
                <button class="w-full">Proceed to Checkout</button>
            </div>
        </section>

    </main>

    <footer>
        <div class="footer-container">
            <div>
                <h2>VoltRider E-Bikes</h2>
                <p>&copy; 2026 VoltRider E-Bikes.</p>
            </div>
        </div>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
