<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - VoltRide</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
    <script src="../jsFile/jsFunctions.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="page">
        <div class="w-100 flex-row" style="justify-content: space-between;">
            <h1>Our Electric Bikes</h1>
            <div class="search-bar" style="max-width: 300px; margin-bottom: 0;">
                <input type="text" placeholder="Search bikes...">
                <button>Go</button>
            </div>
        </div>
        <div class="card-container w-100">
            <div class="card">
                <img src="../sources/mountain-bike.png" alt="Mountain Pro">
                <h3>Mountain Pro X1</h3>
                <p>$2,499.00</p>
                <button class="w-100">Add to Cart</button>
            </div>
            <div class="card">
                <img src="../sources/city-bike.png" alt="City Cruiser">
                <h3>Urban Cruiser</h3>
                <p>$1,899.00</p>
                <button class="w-100">Add to Cart</button>
            </div>
            <div class="card">
                <img src="../sources/racing-bike.png" alt="Aero Racer">
                <h3>Aero Racer V2</h3>
                <p>$3,299.00</p>
                <button class="w-100">Add to Cart</button>
            </div>
            <div class="card">
                <img src="../sources/folding-bike.png" alt="Compact Fold">
                <h3>Compact Fold E1</h3>
                <p>$1,299.00</p>
                <button class="w-100">Add to Cart</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="text-center w-100">
            <p>&copy; 2026 VoltRide Electric Bikes.</p>
        </div>
    </footer>
</body>
</html>
