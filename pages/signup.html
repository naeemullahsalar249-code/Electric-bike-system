<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltRider E-Bikes - Sign Up</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>

    <!-- Placeholder for Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="page flex-center">
        <div class="form-container">
            <h2 class="text-center">Create an Account</h2>
            <p class="text-center mb-4">Join VoltRider to track your orders and checkout faster.</p>
            
            <form id="signup-form">
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                <div>
                    <label for="role">Account Type</label>
                    <div class="select-container">
                        <select id="role" name="role" required>
                            <option value="user">Normal User</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <div>
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="********">
                </div>
                <div class="mt-4">
                    <button type="submit" class="w-full">Sign Up</button>
                </div>
                <div class="text-center mt-4">
                    <p>Already have an account? <a href="login.html" class="link-button">Log in</a></p>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div>
                <h2>VoltRider E-Bikes</h2>
                <p>&copy; 2026 VoltRider E-Bikes.</p>
            </div>
        </div>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
