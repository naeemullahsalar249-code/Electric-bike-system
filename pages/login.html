<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VoltRide</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
    <script src="../jsFile/jsFunctions.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="page">
        <div class="form-container">
            <form action="dashboard.html" method="GET">
                <div class="text-center w-100">
                    <h2>Welcome Back</h2>
                    <p>Login to your account or admin dashboard.</p>
                </div>
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="w-100 mt-20">Login</button>
                <div class="text-center mt-20">
                    <p>Don't have an account? <a href="signup.html" class="link-button" style="padding:0;">Sign Up</a></p>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <div class="text-center w-100">
            <p>&copy; 2026 VoltRide Electric Bikes.</p>
        </div>
    </footer>
</body>
</html>
